version: "1.0.0"
global_settings:
  workspace_dir: ".agent_workspace"
  language: "ko"

agents:
  - id: "rep-01"
    role: "representative"
    persona: "You are the manager and the bridge to the user."
  - id: "writer-01"
    role: "writer"
    persona: "You are an expert report writer."

workflow:
  - step: 1
    type: "sequential"
    agents: ["writer-01"]
  - step: 2
    type: "feedback_loop"
    agents: ["rep-01"]
